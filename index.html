<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MINSAF - Registro de Multas</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            padding: 40px 20px;
        }
        .container { max-width: 700px; margin: 0 auto; }
        .card {
            background: white;
            border-radius: 25px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            overflow: hidden;
        }
        .header {
            background: #2c3e50;
            color: white;
            padding: 25px;
            text-align: center;
        }
        .header h1 { font-size: 24px; margin-bottom: 5px; }
        .header p { opacity: 0.9; font-size: 14px; }
        .form-body { padding: 30px; }
        .form-group { margin-bottom: 20px; }
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #2c3e50;
            font-size: 14px;
        }
        input, select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 14px;
            transition: all 0.3s;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #2c3e50;
        }
        .row { display: flex; gap: 15px; }
        .row .form-group { flex: 1; }
        button {
            width: 100%;
            padding: 15px;
            background: #27ae60;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }
        button:hover {
            background: #219a52;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(39,174,96,0.3);
        }
        button:disabled {
            background: #95a5a6;
            transform: none;
        }
        .info {
            background: #ecf0f1;
            padding: 15px;
            border-radius: 12px;
            margin-top: 20px;
            font-size: 12px;
            color: #7f8c8d;
            text-align: center;
        }
        @media print {
            body { background: white; padding: 0; }
            .card { box-shadow: none; }
            .header, button, .info { display: none; }
            .form-body { padding: 0; }
            input, select { border: none; padding: 5px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="header">
                <h1>🏛️ MINSAF - Dirección de Multas</h1>
                <p>Habana Vieja | Código: 352-2304</p>
            </div>
            <div class="form-body">
                <form id="multaForm">
                    <div class="row">
                        <div class="form-group">
                            <label>📅 FECHA</label>
                            <input type="text" id="fecha" readonly style="background:#f5f5f5">
                        </div>
                        <div class="form-group">
                            <label>🎫 CÓDIGO BOLETA</label>
                            <input type="text" id="boleta" placeholder="Ej: CB542068" required>
                        </div>
                    </div>

                    <div class="row">
                        <div class="form-group">
                            <label>⚖️ DECRETO</label>
                            <select id="imposicion" required>
                                <option value="">Seleccione</option>
                                <option value="18">Decreto 18</option>
                                <option value="87">Decreto 87</option>
                                <option value="91">Decreto 91</option>
                                <option value="272">Decreto 272</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>📌 ARTÍCULO</label>
                            <input type="text" id="articulo" value="-">
                        </div>
                        <div class="form-group">
                            <label>✏️ INCISO</label>
                            <input type="text" id="inciso" value="-">
                        </div>
                    </div>

                    <div class="row">
                        <div class="form-group">
                            <label>💰 CUANTÍA (CUP)</label>
                            <input type="number" step="0.01" id="cuantia" placeholder="500.00" required>
                        </div>
                        <div class="form-group">
                            <label>👤 NOMBRE DEL INFRACTOR</label>
                            <input type="text" id="infractor" placeholder="Nombre y Apellidos" required>
                        </div>
                    </div>

                    <div class="row">
                        <div class="form-group">
                            <label>🆔 CARNET DE IDENTIDAD</label>
                            <input type="text" id="ci" placeholder="Ej: 80010112345" required>
                        </div>
                        <div class="form-group">
                            <label>📍 MUNICIPIO DE RESIDENCIA</label>
                            <input type="text" id="municipio" placeholder="Habana Vieja, Guanatánamo, etc." required>
                        </div>
                    </div>

                    <button type="submit" id="btnSubmit">
                        ✅ REGISTRAR MULTA E IMPRIMIR
                    </button>
                </form>

                <div class="info">
                    📄 Al registrar se generarán DOS copias en hoja tamaño carta.<br>
                    La copia inferior incluye espacio para RECIBÍ CONFORME y SELLO.
                </div>
            </div>
        </div>
    </div>

    <script>
        // ⚠️ IMPORTANTE: Reemplaza con la URL que copiaste al desplegar
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyuTPKgYpieyXqwyQIeb8FoF6UndoQ5dXGJDDyAus2aZPUNLdrdBVq7NM5CeVmdQxQPBw/exec';
        
        function obtenerFecha() {
            const hoy = new Date();
            const dia = String(hoy.getDate()).padStart(2, '0');
            const mes = String(hoy.getMonth() + 1).padStart(2, '0');
            return `${dia}/${mes}`;
        }
        
        document.getElementById('fecha').value = obtenerFecha();
        
        const form = document.getElementById('multaForm');
        const btn = document.getElementById('btnSubmit');
        
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            btn.disabled = true;
            btn.innerHTML = '⏳ Registrando multa...';
            
            const datos = {
                fecha: document.getElementById('fecha').value,
                boleta: document.getElementById('boleta').value,
                imposicion: document.getElementById('imposicion').value,
                articulo: document.getElementById('articulo').value || '-',
                inciso: document.getElementById('inciso').value || '-',
                cuantia: document.getElementById('cuantia').value,
                infractor: document.getElementById('infractor').value,
                ci: document.getElementById('ci').value,
                municipio: document.getElementById('municipio').value
            };
            
            try {
                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify(datos)
                });
                
                alert('✅ Multa registrada exitosamente\n\n📄 Ahora puedes imprimir (Ctrl+P)');
                
                form.reset();
                document.getElementById('fecha').value = obtenerFecha();
                document.getElementById('articulo').value = '-';
                document.getElementById('inciso').value = '-';
                document.getElementById('boleta').focus();
                
                setTimeout(() => {
                    if (confirm('¿Deseas imprimir ahora la multa?')) {
                        window.print();
                    }
                }, 500);
                
            } catch (error) {
                alert('❌ Error: ' + error.message);
            } finally {
                btn.disabled = false;
                btn.innerHTML = '✅ REGISTRAR MULTA E IMPRIMIR';
            }
        });
    </script>
</body>
</html>
