<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MINSAF - Registrar Multa</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1e3c72;
            font-family: 'Segoe UI', sans-serif;
            padding: 20px;
        }
        .container { max-width: 500px; margin: 0 auto; }
        .card {
            background: white;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .header {
            text-align: center;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 2px solid #2c3e50;
        }
        .header h1 { color: #2c3e50; font-size: 22px; }
        .header p { color: #666; font-size: 13px; }
        input, select {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 14px;
        }
        label {
            font-weight: 600;
            font-size: 13px;
            color: #2c3e50;
            margin-bottom: 5px;
            display: block;
        }
        button {
            width: 100%;
            padding: 14px;
            background: #27ae60;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        button:hover { background: #219a52; }
        .row { display: flex; gap: 10px; }
        .row > div { flex: 1; }
        .info {
            background: #e8f4fd;
            padding: 12px;
            border-radius: 10px;
            margin-top: 15px;
            font-size: 12px;
            text-align: center;
            color: #2c3e50;
        }
        .fecha-input {
            background: white !important;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="header">
                <h1>🏛️ MINSAF - Dirección de Multas</h1>
                <p>Habana Vieja | Registro de Infracciones</p>
            </div>

            <form id="multaForm">
                <div class="row">
                    <div>
                        <label>📅 FECHA (editable)</label>
                        <input type="date" id="fecha" class="fecha-input" required>
                    </div>
                    <div>
                        <label>🎫 NÚMERO DE BOLETA</label>
                        <input type="text" id="boleta" placeholder="Ej: CB542068" required>
                    </div>
                </div>

                <div class="row">
                    <div>
                        <label>⚖️ DECRETO</label>
                        <select id="decreto" required>
                            <option value="">Seleccione</option>
                            <option value="18">Decreto 18</option>
                            <option value="87">Decreto 87</option>
                            <option value="91">Decreto 91</option>
                            <option value="272">Decreto 272</option>
                        </select>
                    </div>
                    <div>
                        <label>📌 ARTÍCULO</label>
                        <input type="text" id="articulo" placeholder="Ej: 94" value="-">
                    </div>
                    <div>
                        <label>✏️ INCISO</label>
                        <input type="text" id="inciso" placeholder="Ej: b" value="-">
                    </div>
                </div>

                <div>
                    <label>💰 CUANTÍA DE LA MULTA (CUP)</label>
                    <input type="number" step="0.01" id="cuantia" placeholder="500.00" required>
                </div>

                <div>
                    <label>👤 NOMBRE Y APELLIDOS DEL INFRACTOR</label>
                    <input type="text" id="infractor" placeholder="Nombre completo" required>
                </div>

                <div class="row">
                    <div>
                        <label>🆔 CARNET DE IDENTIDAD</label>
                        <input type="text" id="ci" placeholder="80010112345" required>
                    </div>
                    <div>
                        <label>📍 MUNICIPIO DE RESIDENCIA</label>
                        <select id="municipio" required>
                            <option value="">Seleccione</option>
                            <option value="Habana Vieja">🏠 Habana Vieja</option>
                            <option value="Centro Habana">🌆 Centro Habana</option>
                            <option value="Cerro">⛰️ Cerro</option>
                            <option value="Plaza de la Revolución">🏛️ Plaza</option>
                            <option value="10 de Octubre">📅 10 de Octubre</option>
                            <option value="Arroyo Naranjo">🍊 Arroyo Naranjo</option>
                            <option value="Boyeros">🚜 Boyeros</option>
                            <option value="La Lisa">🌸 La Lisa</option>
                            <option value="Marianao">🎵 Marianao</option>
                            <option value="Guanabacoa">⛪ Guanabacoa</option>
                            <option value="San Miguel del Padrón">⛅ San Miguel</option>
                            <option value="Cotorro">🐓 Cotorro</option>
                            <option value="Otro municipio">📍 Otro municipio</option>
                        </select>
                    </div>
                </div>

                <div id="otroMunicipioDiv" style="display:none;">
                    <label>✏️ Especifique el municipio</label>
                    <input type="text" id="otroMunicipio" placeholder="Ej: Santiago de Cuba">
                </div>

                <div>
                    <label>👮 INSPECTOR ACTUANTE</label>
                    <select id="inspector" required>
                        <option value="">Seleccione</option>
                        <option>Mirta</option><option>Mae</option><option>Barbarita</option>
                        <option>Dayami</option><option>Dadioska</option><option>Rolando</option>
                        <option>Gerter</option><option>Maritza</option><option>Roxana</option>
                        <option>Yeni</option>
                    </select>
                </div>

                <button type="submit" id="btnSubmit">✅ REGISTRAR MULTA</button>

                <div class="info" id="infoDestino">
                    📌 La multa irá a la hoja correspondiente según Decreto + Municipio
                </div>
            </form>
        </div>
    </div>

    <script>
        // ⚠️ REEMPLAZA con la URL que copiaste de Apps Script
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbx7X84i8AGv3Ec5WPzxWBpjp4qkcDy9wZIDMjqHRo9H4znsGwIXbjDrLAY_1grezNrb/exec';
        
        // Fecha actual en formato YYYY-MM-DD para input date
        const hoy = new Date();
        const año = hoy.getFullYear();
        const mes = String(hoy.getMonth() + 1).padStart(2, '0');
        const dia = String(hoy.getDate()).padStart(2, '0');
        const fechaActual = `${año}-${mes}-${dia}`;
        document.getElementById('fecha').value = fechaActual;
        
        // Mostrar campo "Otro municipio"
        const municipioSelect = document.getElementById('municipio');
        const otroDiv = document.getElementById('otroMunicipioDiv');
        const otroInput = document.getElementById('otroMunicipio');
        
        municipioSelect.addEventListener('change', function() {
            if (this.value === 'Otro municipio') {
                otroDiv.style.display = 'block';
                otroInput.required = true;
            } else {
                otroDiv.style.display = 'none';
                otroInput.required = false;
            }
            actualizarInfoDestino();
        });
        
        const decretoSelect = document.getElementById('decreto');
        decretoSelect.addEventListener('change', actualizarInfoDestino);
        
        function actualizarInfoDestino() {
            const decreto = decretoSelect.value;
            let municipio = municipioSelect.value;
            if (municipio === 'Otro municipio') {
                municipio = otroInput.value || "?";
            }
            
            const infoDiv = document.getElementById('infoDestino');
            if (decreto && municipio) {
                const esHabanaVieja = municipio === 'Habana Vieja';
                const destino = esHabanaVieja ? `${decreto}_HabanaVieja` : `${decreto}_OtrosMunicipios`;
                infoDiv.innerHTML = `📌 La multa irá a la hoja: <strong>${destino}</strong><br>📊 El contador del inspector se actualizará automáticamente`;
                infoDiv.style.background = "#d4edda";
            } else {
                infoDiv.innerHTML = "📌 Seleccione Decreto y Municipio para ver el destino";
                infoDiv.style.background = "#e8f4fd";
            }
        }
        
        const form = document.getElementById('multaForm');
        const btn = document.getElementById('btnSubmit');
        
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            let municipioFinal = municipioSelect.value;
            if (municipioFinal === 'Otro municipio') {
                municipioFinal = otroInput.value;
                if (!municipioFinal) {
                    alert('Por favor, especifique el municipio');
                    return;
                }
            }
            
            // Convertir fecha de YYYY-MM-DD a DD/MM/YYYY
            const fechaInput = document.getElementById('fecha').value;
            const fechaFormateada = fechaInput.split('-').reverse().join('/');
            
            btn.disabled = true;
            btn.innerHTML = '⏳ Registrando multa...';
            
            const datos = {
                fecha: fechaFormateada,
                boleta: document.getElementById('boleta').value,
                decreto: document.getElementById('decreto').value,
                articulo: document.getElementById('articulo').value || '-',
                inciso: document.getElementById('inciso').value || '-',
                cuantia: document.getElementById('cuantia').value,
                infractor: document.getElementById('infractor').value,
                ci: document.getElementById('ci').value,
                municipio: municipioFinal,
                inspector: document.getElementById('inspector').value
            };
            
            try {
                await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify(datos)
                });
                
                const esHabanaVieja = municipioFinal === 'Habana Vieja';
                const hojaDestino = esHabanaVieja ? `${datos.decreto}_HabanaVieja` : `${datos.decreto}_OtrosMunicipios`;
                
                alert(`✅ Multa registrada exitosamente!\n\n📄 Hoja destino: ${hojaDestino}\n👮 Contador del inspector actualizado`);
                
                form.reset();
                document.getElementById('fecha').value = fechaActual;
                document.getElementById('articulo').value = '-';
                document.getElementById('inciso').value = '-';
                document.getElementById('boleta').focus();
                otroDiv.style.display = 'none';
                
            } catch (error) {
                alert('❌ Error al registrar: ' + error.message);
            } finally {
                btn.disabled = false;
                btn.innerHTML = '✅ REGISTRAR MULTA';
            }
        });
    </script>
</body>
</html>
